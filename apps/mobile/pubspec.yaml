name: yapigo
description: "yapigo - App sociale d'activites sportives a Montreal"
publish_to: 'none'
version: 2.2.2+57  # 2026-03-25 17:14

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.2.0
  intl: ^0.20.2
  flutter_animate: ^4.5.2
  package_info_plus: ^8.3.0
  shimmer: ^3.0.0
  share_plus: ^10.0.0
  url_launcher: ^6.3.2
  video_player: ^2.9.3
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/logo/
    - assets/images/carousel/
    - assets/video/
    - assets/icons/
    - assets/pace/
    - assets/badges/
    - assets/neighborhoods/
    - assets/onboarding/
    - assets/companions/
    - assets/empty/
    - assets/cities/
